<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e28"/>
      <stop offset="100%" style="stop-color:#16161f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6495ed"/>
      <stop offset="100%" style="stop-color:#00d2d3"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffc83c"/>
      <stop offset="100%" style="stop-color:#ff9f43"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" rx="16" fill="url(#bg)"/>

  <!-- Vinyl disc -->
  <circle cx="60" cy="60" r="36" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.6"/>
  <circle cx="60" cy="60" r="28" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <circle cx="60" cy="60" r="20" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <circle cx="60" cy="60" r="8" fill="url(#accent)"/>
  <circle cx="60" cy="60" r="3" fill="#1e1e28"/>

  <!-- Play triangle on disc -->
  <polygon points="54,48 54,72 74,60" fill="url(#gold)" opacity="0.9"/>

  <!-- Text: Qobuz -->
  <text x="115" y="55" font-family="monospace, 'Courier New'" font-size="36" font-weight="bold" fill="url(#accent)">Q</text>
  <text x="140" y="55" font-family="monospace, 'Courier New'" font-size="36" font-weight="bold" fill="#dcdce6">obuz</text>

  <!-- Text: TUI -->
  <text x="260" y="55" font-family="monospace, 'Courier New'" font-size="36" font-weight="bold" fill="url(#gold)">TUI</text>

  <!-- Subtitle -->
  <text x="115" y="82" font-family="monospace, 'Courier New'" font-size="13" fill="#969aa5">Terminal music player</text>

  <!-- Decorative sound bars -->
  <rect x="352" y="42" width="4" height="36" rx="2" fill="url(#accent)" opacity="0.7"/>
  <rect x="362" y="34" width="4" height="52" rx="2" fill="url(#accent)" opacity="0.5"/>
  <rect x="372" y="46" width="4" height="28" rx="2" fill="url(#accent)" opacity="0.3"/>
  <rect x="382" y="38" width="4" height="44" rx="2" fill="url(#accent)" opacity="0.5"/>
</svg>
