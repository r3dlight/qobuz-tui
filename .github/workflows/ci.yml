name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run audit (ignore warnings)
        run: cargo audit || true

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - name: Install ALSA dev
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --release --workspace -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install ALSA dev
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: qobuz-tui-linux-x86_64
          path: target/release/qobuz-tui

  deb:
    name: Build .deb
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install ALSA dev
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deb
        run: cargo install cargo-deb
      - name: Build .deb
        run: cargo deb -p qobuz-tui
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: qobuz-tui-deb
          path: target/debian/*.deb

  archlinux:
    name: Build Arch Linux package
    runs-on: ubuntu-latest
    needs: build
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel rustup alsa-lib git
          rustup default nightly
      - name: Build PKGBUILD
        run: |
          # Create a non-root user for makepkg
          useradd -m builder
          chown -R builder:builder .
          su builder -c "makepkg -s --noconfirm"
      - name: Upload .pkg.tar.zst
        uses: actions/upload-artifact@v4
        with:
          name: qobuz-tui-archlinux
          path: "*.pkg.tar.zst"
